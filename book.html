<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Book Reader - Dexterity Learn</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">
  
  <style>
    /* Styling copied from index.html to guarantee visual unity */
    :root {
      --green-deep: #053526;
      --green-mid: #0a3d2f;
      --green-light: #155d49;
      --gold: #d4af37;
      --gold-bright: #f5e0a3;
      --white: #ffffff;
      --cream: #fdf3e1;
      --cream-dim: rgba(253,243,225,0.72);
      --font-heading: 'Outfit', sans-serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--green-deep);
      color: var(--cream);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow: hidden;
    }

    /* W3Schools style player layout */
    .reader-header {
      height: 60px;
      background: rgba(5,29,22,0.95);
      border-bottom: 1px solid rgba(253,243,225,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 10;
    }

    .reader-back-btn {
      background: none;
      border: none;
      color: var(--cream-dim);
      font-size: 0.88rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      cursor: pointer;
      transition: color 0.2s;
    }

    .reader-back-btn:hover {
      color: var(--gold-bright);
    }

    .reader-header-title {
      font-family: var(--font-heading);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--gold-bright);
      text-align: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      border-radius: 30px;
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-decoration: none;
      width: 100%;
    }

    .btn-gold {
      background: var(--gold);
      color: var(--green-deep);
      border: 1px solid var(--gold);
      box-shadow: 0 4px 15px rgba(212,175,55,0.25);
    }

    .btn-gold:hover {
      background: var(--gold-bright);
      border-color: var(--gold-bright);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(212,175,55,0.35);
    }

    .btn-outline {
      background: transparent;
      color: var(--cream);
      border: 1px solid rgba(253,243,225,0.3);
    }

    .btn-outline:hover {
      background: rgba(253,243,225,0.06);
      border-color: var(--cream);
      transform: translateY(-2px);
    }

    .btn-sm {
      padding: 10px 18px;
      font-size: 0.85rem;
      border-radius: 20px;
    }

    .reader-layout {
      display: flex;
      height: calc(100vh - 60px);
      overflow: hidden;
      flex-direction: row;
    }

    /* Left Sidebar: Book Details and Covers */
    .book-details-sidebar {
      width: 290px;
      background: rgba(4,22,17,0.98);
      border-right: 1px solid rgba(253,243,225,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .book-sidebar-cover {
      width: 140px;
      height: 190px;
      margin-bottom: 20px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.5);
      border-radius: 4px 10px 10px 4px;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }

    .book-sidebar-meta {
      width: 100%;
      text-align: center;
    }

    .book-sidebar-meta h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 8px;
      font-family: var(--font-heading);
    }

    .badge {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 800;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(212,175,55,0.14);
      color: var(--gold-bright);
      white-space: nowrap;
      border: 1px solid rgba(212,175,55,0.18);
      display: inline-block;
      margin-bottom: 12px;
    }

    .book-sidebar-meta .desc {
      font-size: 0.82rem;
      color: var(--cream-dim);
      line-height: 1.5;
      margin-top: 6px;
      text-align: left;
    }

    .price-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 14px 0;
    }

    .price b {
      font-family: var(--font-heading);
      font-size: 1.3rem;
      color: var(--gold-bright);
      font-weight: 700;
    }

    .price s {
      color: var(--cream-dim);
      font-size: 0.88rem;
    }

    /* Content Area */
    .reader-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      background: rgba(10,61,47,0.06);
    }

    .reader-inner-wrap {
      flex: 1;
      padding: 40px 48px;
      max-width: 820px;
      margin: 0 auto;
      width: 100%;
    }

    .reader-lesson-title {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 20px;
      color: var(--white);
      border-bottom: 2px solid rgba(253,243,225,0.08);
      padding-bottom: 12px;
    }

    .reader-text {
      font-size: 0.98rem;
      line-height: 1.75;
      color: var(--cream-dim);
    }

    .reader-text p {
      margin-bottom: 18px;
    }

    .reader-text strong {
      color: var(--white);
    }

    .reader-text pre {
      background: rgba(0,0,0,0.3);
      padding: 12px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.9rem;
      overflow-x: auto;
      margin: 14px 0;
      border: 1px solid rgba(253,243,225,0.06);
    }

    /* Locked state lock screen styling */
    .reader-locked-overlay {
      background: rgba(4,22,17,0.9);
      border: 1px solid rgba(253,243,225,0.12);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 30px;
      text-align: center;
      margin-top: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .reader-locked-icon {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: rgba(212,175,55,0.1);
      border: 1px solid rgba(212,175,55,0.25);
      color: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .reader-locked-overlay h4 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--white);
      font-family: var(--font-heading);
    }

    .reader-locked-overlay p {
      font-size: 0.9rem;
      color: var(--cream-dim);
      max-width: 360px;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    /* Unlock inputs styling */
    .lock-input-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 300px;
      margin-bottom: 16px;
    }

    .lock-input {
      background: rgba(253,243,225,0.05);
      border: 1px solid rgba(253,243,225,0.2);
      border-radius: 20px;
      padding: 10px 18px;
      color: var(--white);
      font-size: 1rem;
      text-align: center;
      outline: none;
      letter-spacing: 0.15em;
      font-weight: 700;
      transition: border-color 0.2s;
    }

    .lock-input:focus {
      border-color: var(--gold);
    }

    .lock-input-group .btn {
      width: 100%;
    }

    /* Responsive E-book Reader */
    @media (max-width: 759px) {
      .reader-layout {
        flex-direction: column;
        height: calc(100vh - 60px);
        overflow-y: auto;
      }
      .book-details-sidebar {
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid rgba(253,243,225,0.08);
        padding: 20px;
        flex-direction: row;
        gap: 20px;
        align-items: flex-start;
        overflow-y: visible;
      }
      .book-sidebar-cover {
        width: 90px;
        height: 125px;
        margin-bottom: 0;
      }
      .book-sidebar-meta {
        text-align: left;
        flex: 1;
      }
      .book-sidebar-meta h3 {
        font-size: 1.05rem;
      }
      .book-sidebar-meta .desc {
        display: none; /* Hide description on mobile details sidebar */
      }
      .reader-content {
        overflow-y: visible;
      }
      .reader-inner-wrap {
        padding: 24px 20px;
      }
    }
  </style>
</head>

    /* ===================== DYNAMIC COVER GENERATOR ===================== */
    function getCoverSVG(id, title, category, isLandscape = false) {
      let accentColor = "var(--gold)";
      let gradFrom = "#0f4a38";
      let gradTo = "#051d16";
      let iconSVG = "";
      let subText = category.toUpperCase();

      if (id === "ebk-learn-ai") {
        accentColor = "#38bdf8"; // Neon Sky Blue
        gradFrom = "#1e1b4b";    // Dark Indigo
        gradTo = "#08051a";
      } else if (id === "ebk-python") {
        accentColor = "#f5e0a3";  // Light Gold
        gradFrom = "#022c22";     // Deep Dark Emerald
        gradTo = "#051611";
      } else if (id === "ebk-freelance") {
        accentColor = "#f97316";  // Vibrant Orange/Coral
        gradFrom = "#450a0a";     // Burgundy
        gradTo = "#1c0202";
      } else if (id === "ebk-webdev") {
        accentColor = "#06b6d4";  // Cyan
        gradFrom = "#0c4a6e";     // Sky-900
        gradTo = "#021622";
      }

      if (category === "AI") {
        iconSVG = `
          <circle cx="100" cy="${isLandscape ? 60 : 100}" r="8" fill="none" stroke="${accentColor}" stroke-width="2"/>
          <circle cx="70" cy="${isLandscape ? 40 : 80}" r="6" fill="none" stroke="${accentColor}" stroke-width="2"/>
          <circle cx="130" cy="${isLandscape ? 40 : 80}" r="6" fill="none" stroke="${accentColor}" stroke-width="2"/>
          <line x1="100" y1="${isLandscape ? 60 : 100}" x2="70" y2="${isLandscape ? 40 : 80}" stroke="${accentColor}" stroke-width="1.5" stroke-dasharray="3,3"/>
          <line x1="100" y1="${isLandscape ? 60 : 100}" x2="130" y2="${isLandscape ? 40 : 80}" stroke="${accentColor}" stroke-width="1.5" stroke-dasharray="3,3"/>
          <circle cx="100" cy="${isLandscape ? 60 : 100}" r="3" fill="${accentColor}"/>
        `;
      } else if (category === "Programming") {
        iconSVG = `
          <path d="M80 ${isLandscape ? 45 : 85} L65 ${isLandscape ? 60 : 100} L80 ${isLandscape ? 75 : 115}" fill="none" stroke="${accentColor}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M120 ${isLandscape ? 45 : 85} L135 ${isLandscape ? 60 : 100} L120 ${isLandscape ? 75 : 115}" fill="none" stroke="${accentColor}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        `;
      } else {
        iconSVG = `
          <path d="M70 ${isLandscape ? 45 : 85} L100 ${isLandscape ? 75 : 115} L130 ${isLandscape ? 45 : 85} Z" fill="none" stroke="${accentColor}" stroke-width="2" stroke-linejoin="round"/>
          <circle cx="100" cy="${isLandscape ? 60 : 100}" r="4" fill="${accentColor}"/>
        `;
      }

      const viewBox = isLandscape ? "0 0 200 120" : "0 0 200 200";
      const overlayY = isLandscape ? 85 : 150;
      const overlayHeight = isLandscape ? 35 : 50;

      return `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="${viewBox}" style="width:100%; height:100%; display:block;">
          <defs>
            <linearGradient id="grad-${id}-${isLandscape}" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="${gradFrom}" />
              <stop offset="100%" stop-color="${gradTo}" />
            </linearGradient>
          </defs>
          <rect width="200" height="${isLandscape ? 120 : 200}" fill="url(#grad-${id}-${isLandscape})" rx="8"/>
          
          <!-- Tech grids for landscape courses -->
          ${isLandscape ? `
            <g opacity="0.06">
              <line x1="20" y1="0" x2="20" y2="120" stroke="var(--cream)" stroke-width="0.8"/>
              <line x1="40" y1="0" x2="40" y2="120" stroke="var(--cream)" stroke-width="0.8"/>
              <line x1="60" y1="0" x2="60" y2="120" stroke="var(--cream)" stroke-width="0.8"/>
              <line x1="80" y1="0" x2="80" y2="120" stroke="var(--cream)" stroke-width="0.8"/>
              <line x1="100" y1="0" x2="100" y2="120" stroke="var(--cream)" stroke-width="0.8"/>
              <line x1="120" y1="0" x2="120" y2="120" stroke="var(--cream)" stroke-width="0.8"/>
              <line x1="140" y1="0" x2="140" y2="120" stroke="var(--cream)" stroke-width="0.8"/>

          <!-- Specialized course widgets -->
          ${isLandscape ? `

            <g transform="translate(100, 48) scale(0.9)" opacity="0.85">

          <rect x="0" y="${overlayY}" width="200" height="${overlayHeight}" fill="rgba(5,29,22,0.85)" />
          <line x1="0" y1="${overlayY}" x2="200" y2="${overlayY}" stroke="${accentColor}" stroke-width="1.5" opacity="0.6"/>
          <text x="15" y="${overlayY + 12}" fill="${accentColor}" font-family="'Outfit', sans-serif" font-size="7.5" font-weight="800" letter-spacing="1.2" opacity="0.9">${subText}</text>
          <text x="15" y="${overlayY + 24}" fill="var(--white)" font-family="'Outfit', sans-serif" font-size="9" font-weight="700" letter-spacing="0.2">${title.length > 24 ? title.substring(0, 22) + '...' : title}</text>
        </svg>
      `;
    }

    function openWhatsApp(message){
      const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
      window.open(url, "_blank");
    }

    function fmtPrice(n){
      return "₹" + n;
    }

    /* ===================== E-BOOK LOADING ===================== */
    let activeBookId = "";

    function loadBookPage(bookId) {
      const book = EBOOKS.find(b => b.id === bookId);
      if (!book) {
        window.location.href = "index.html";
        return;
      }
      
      activeBookId = bookId;
      
      // Set Header Title
      document.getElementById("book-reader-title-header").textContent = book.title;
      
      // Cover area rendering
      const coverArea = document.getElementById("book-reader-cover-area");
      coverArea.innerHTML = getCoverSVG(book.id, book.title, book.category, false);
      
      // Bind info metadata
      document.getElementById("book-sidebar-title").textContent = book.title;
      document.getElementById("book-sidebar-badge").textContent = book.tag || book.category;
      document.getElementById("book-sidebar-badge").style.display = book.tag ? "inline-block" : "none";
      document.getElementById("book-sidebar-desc").textContent = book.desc;
      document.getElementById("book-sidebar-mrp").textContent = fmtPrice(book.mrp);
      document.getElementById("book-sidebar-price").textContent = fmtPrice(book.price);
      
      // Bind actions
      document.getElementById("book-sidebar-buy-action").onclick = () => {
        openWhatsApp(`Hi! I'd like to buy the e-book "${book.title}" (${fmtPrice(book.price)}).`);
      };
      
      // Add to cart helper utilizing localStorage sync
      document.getElementById("book-sidebar-cart-action").onclick = () => {
        let cart = JSON.parse(localStorage.getItem("dex_cart") || "[]");
        if (!cart.some(item => item.id === bookId)) {
          cart.push(book);
          localStorage.setItem("dex_cart", JSON.stringify(cart));
          alert(`"${book.title}" has been added to your interest list!`);
        } else {
          alert(`"${book.title}" is already in your interest list.`);
        }
      };
      
      document.getElementById("book-reader-buy-btn").onclick = () => {
        openWhatsApp(`Hi! I'd like to buy the e-book "${book.title}" (${fmtPrice(book.price)}).`);
      };
      
      // Content area chapter 1 loading
      document.getElementById("book-reader-content-area").innerHTML = book.sampleChapter;
      
      // Verify locked state
      const isUnlocked = localStorage.getItem("unlock_" + bookId) === "true";
      const lockPanel = document.getElementById("book-reader-locked-section");
      
      if (isUnlocked) {
        // Book is fully unlocked, show standard confirmation message instead of input block
        lockPanel.className = "reader-locked-overlay";
        lockPanel.style.borderColor = "var(--gold)";
        lockPanel.style.background = "rgba(212,175,55,0.05)";
        lockPanel.innerHTML = `
          <div class="reader-locked-icon" style="color:#34d399; background:rgba(52,211,153,0.1); border-color:rgba(52,211,153,0.25);">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
          <h4 style="color:#34d399;">E-Book Unlocked Successfully!</h4>
          <p>Thank you for your purchase. All remaining chapters of "${book.title}" are now unlocked for viewing inside this reader tab.</p>
        `;
      } else {
        // Show passcode verify overlay inputs
        lockPanel.style.display = "flex";
      }
    }

    /* ===================== PASSCODE CHECK ===================== */
    function verifyBookCode() {
      const inputVal = document.getElementById("book-passcode-field").value.trim();
      const book = EBOOKS.find(b => b.id === activeBookId);
      if (!book) return;
      
      if (inputVal === book.unlockCode) {
        localStorage.setItem("unlock_" + activeBookId, "true");
        alert("Success! The e-book has been fully unlocked.");
        loadBookPage(activeBookId);
      } else {
        alert("Incorrect passcode! Please verify the code or check with support on WhatsApp.");
      }
    }

    function inquireBookUnlockWhatsApp() {
      const book = EBOOKS.find(b => b.id === activeBookId);
      if (!book) return;
      
      const msg = `Hi Dexterity Learn! I would like to get the 6-digit unlock code for my e-book purchase: "${book.title}".`;
      openWhatsApp(msg);
    }

    // Read ID from Query Param
    const urlParams = new URLSearchParams(window.location.search);
    const initialBookId = urlParams.get('id') || "ebk-learn-ai";
    loadBookPage(initialBookId);

  </script>
</body>
</html>
